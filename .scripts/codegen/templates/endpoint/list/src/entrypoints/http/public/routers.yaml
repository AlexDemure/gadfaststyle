files:
- path: src/entrypoints/http/public/routers/{{ collection }}/__init__.py
  mode: w
  content: |
    from .registry import router
- path: src/entrypoints/http/public/routers/{{ collection }}/registry.py
  mode: w
  content: |
    from src.framework.routing import APIRouter


    router = APIRouter()
- path: src/entrypoints/http/public/routers/{{ collection }}/{{ operation }}.py
  mode: w
  content: |
    from fastapi import Body
    from fastapi import Depends
    from fastapi import status

    from src.application.usecases.{{ collection }}.list import Usecase
    from src.entrypoints.http.public.deps.{{ collection }}.list import dependency
    from src.entrypoints.http.public.schemas import List{{ model }}
    from src.entrypoints.http.public.schemas import {{ model }}
    from src.framework.routing import APIRouter


    router = APIRouter()


    @router.post(
        "/{{ collection }}:list",
        status_code=status.HTTP_200_OK,
        response_model=list[{{ model }}],
        description="List {{ table }}",
    )
    async def query(
        body: List{{ model }} = Body(...),
        usecase: Usecase = Depends(dependency),
    ) -> list[{{ model }}]:
        {{ collection }} = await usecase(**body.deserialize())

        return [{{ model }}.serialize({{ table }}) for {{ table }} in {{ collection }}]
- path: src/entrypoints/http/public/routers/{{ collection }}/registry.py
  mode: a
  content: |
    from . import {{ operation }}
- path: src/entrypoints/http/public/routers/{{ collection }}/registry.py
  mode: a
  content: |
    router.include_router({{ operation }}.router)
- path: src/entrypoints/http/public/routers/registry.py
  mode: a
  content: |
    from . import {{ collection }}
- path: src/entrypoints/http/public/routers/registry.py
  mode: a
  content: |
    router.include_router({{ collection }}.router, tags=["{{ model }}"])
