files:
- path: src/application/usecases/{{ collection }}/__init__.py
  mode: w
  content: ''
- path: src/application/usecases/{{ collection }}/{{ operation }}.py
  mode: w
  content: |
    import types
    import typing

    from src.decorators.usecases.session import sessionmaker
    from src.domain.models import {{ model }}
    from src.infrastructure.databases.orm.sqlalchemy.session import Session
    from src.infrastructure.databases.postgres.adapters import repositories


    class Usecase:
        container: types.SimpleNamespace

        def build(self, session: Session) -> None:
            self.container = types.SimpleNamespace(
                repository=types.SimpleNamespace(
                    {{ table }}=repositories.{{ model }}(session),
                ),
            )

        @sessionmaker.read
        async def __call__(
            self,
            session: Session,
            filters: dict[str, typing.Any],
            sorting: dict[str, typing.Any],
            pagination: dict[str, int],
        ) -> list[{{ model }}]:
            self.build(session)

            {{ collection }} = await self.container.repository.{{ table }}.list(
                filters=filters,
                sorting=sorting,
                pagination=pagination,
            )

            return {{ collection }}
