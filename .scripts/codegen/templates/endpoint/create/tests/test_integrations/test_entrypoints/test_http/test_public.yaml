            return await self.client.post(
                "/api/{{ collection }}:create",
                json={
                    # TODO: fill request body
                },
            )

        async def check(self, response: Response) -> None:
            assert response.status_code == 201

            schema = {{ model }}.model_validate(response.json())

            assert schema.id

        async def test(self, client: AsyncClient) -> None:
            self.client = client

            await self.setup()

