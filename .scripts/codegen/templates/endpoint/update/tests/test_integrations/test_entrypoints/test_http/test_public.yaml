                # TODO: fill request body
            }

        async def process(self) -> Response:
            return await self.client.put("/api/{{ collection }}:update", json=self.payload)

        async def check(self, response: Response) -> None:
            assert response.status_code == 204

        async def test(self, client: AsyncClient) -> None:
