- path: tests/test_integrations/test_entrypoints/test_http/test_public/test_{{ collection }}/test_{{ operation }}.py
  mode: w
  content: |
    from httpx import AsyncClient
    from httpx import Response

    from tests.factories.infrastructure.databases.postgres import tables


    class TestUpdate{{ model }}:
        client: AsyncClient
        model: tables.{{ model }}

        async def setup(self) -> None:
            self.model = await tables.{{ model }}.init(model={})

        async def process(self) -> Response:
            return await self.client.put(
                "/api/{{ collection }}:update",
                json={
                    "id": self.model.id,
                    # TODO: fill request body
                },
            )

        async def check(self, response: Response) -> None:
            assert response.status_code == 204
            assert not response.content

        async def test(self, client: AsyncClient) -> None:
            self.client = client

            await self.setup()

            response = await self.process()

            await self.check(response)
