files:
- path: tests/test_integrations/test_entrypoints/test_http/test_public/test_{{ collection }}/__init__.py
  mode: w
  content: ''
- path: tests/test_integrations/test_entrypoints/test_http/test_public/test_{{ collection }}/test_{{ operation }}.py
  mode: w
  content: |
    from httpx import AsyncClient
    from httpx import Response

    from src.entrypoints.http.public.schemas import {{ model }}
    from tests.factories.infrastructure.databases.postgres.tables import {{ model }} as {{ model }}Factory


    class TestGet{{ model }}:
        client: AsyncClient
        model: {{ model }}Factory

        async def setup(self) -> None:
            self.model = await {{ model }}Factory.init(model={})

        async def process(self) -> Response:
            return await self.client.get(f"/api/{{ collection }}/{self.model.id}")

        async def check(self, response: Response) -> None:
            assert response.status_code == 200
            
            schema = {{ model }}.model_validate(response.json())

            assert schema.id == self.model.id

        async def test(self, client: AsyncClient) -> None:
            self.client = client

            await self.setup()

            response = await self.process()

            await self.check(response)
