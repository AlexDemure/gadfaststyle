files:
- path: tests/factories/domain/models/{{ table }}.py
  mode: w
  content: |
    import typing

    from src.common.formats.utils import date
    from src.domain.models import {{ model }} as Model


    class {{ model }}:
        @classmethod
        def init(cls, model: dict[str, typing.Any] | None = None) -> Model:
            overrides = dict(model or {})
            created = overrides.pop("created", date.now())
            updated = overrides.pop("updated", created)

            return Model(
                id=overrides.pop("id", 1),
                created=created,
                updated=updated,
                **overrides,
            )
- path: tests/factories/domain/models/__init__.py
  mode: p
  content: |
    from .{{ table }} import {{ model }}
