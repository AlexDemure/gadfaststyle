files:
- path: src/domain/models/{{ table }}.py
  mode: w
  content: |
    import datetime
    import typing

    from src.common.formats.utils import date

    from .base import Base


    class {{ model }}(Base):
        __encrypted__ = []

        id: int | None
        created: datetime.datetime
        updated: datetime.datetime
        # TODO: add business fields

        @classmethod
        def init(cls, **kwargs: typing.Any) -> typing.Self:
            created = updated = date.now()

            return cls(
                id=None,
                created=created,
                updated=updated,
                **kwargs,
            )
- path: src/domain/models/__init__.py
  mode: a
  content: |
    from .{{ table }} import {{ model }}
