version: 1

start: delivery-manager

nodes:
  delivery-manager:
    agent: delivery-manager
    outputs:
      - 10-delivery-manager.md
    next:
      - project-architect

  project-architect:
    agent: project-architect
    inputs:
      - 10-delivery-manager.md
    outputs:
      - 20-project-architect.md
    next:
      - task-orchestrator

  task-orchestrator:
    agent: task-orchestrator
    inputs:
      - 20-project-architect.md
    outputs:
      - 30-task-orchestrator.md
    next:
      - code-implementer

  code-implementer:
    agent: code-implementer
    inputs:
      - 30-task-orchestrator.md
    outputs:
      - 40-code-implementer.md
    next:
      - test-writer

  test-writer:
    agent: test-writer
    inputs:
      - 30-task-orchestrator.md
      - 40-code-implementer.md
    outputs:
      - 50-test-writer.md
    next:
      - code-reviewer

  code-reviewer:
    agent: code-reviewer
    inputs:
      - 30-task-orchestrator.md
      - 40-code-implementer.md
      - 50-test-writer.md
    outputs:
      - 60-code-reviewer.md
    transitions:
      approved: report-compiler
      changes_required: code-implementer

  report-compiler:
    agent: report-compiler
    inputs:
      - 10-delivery-manager.md
      - 20-project-architect.md
      - 30-task-orchestrator.md
      - 40-code-implementer.md
      - 50-test-writer.md
      - 60-code-reviewer.md
    outputs:
      - 70-report-compiler.md
